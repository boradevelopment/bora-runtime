name: Build on push

on:
  push:
      paths:
      - 'src/**'
      - 'contribs/**'
      - '.github/workflows/cmakebuild.yaml'

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Create Bora Structure
        run: |
          cd ../
          git clone https://github.com/boradevelopment/bora-global.git global
      - name: Build with CMake
        uses: threeal/cmake-action@v2.1.0
        with:
          source-dir: ./
          build-dir: build/linux

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Create Bora Structure
        shell: bash
        run: |
          cd ../
          git clone https://github.com/boradevelopment/bora-global.git global

      - name: Build with CMake
        uses: threeal/cmake-action@v2.1.0
        with:
          source-dir: ./
          build-dir: build/win32

  build-macos-arm:
    name: Build on macOS ARM
    runs-on: macos-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Create Bora Structure
        run: |
          cd ../
          git clone https://github.com/boradevelopment/bora-global.git global
          
      - name: Build with CMake
        uses: threeal/cmake-action@v2.1.0
        with:
          source-dir: ./
          build-dir: build/darwin

  build-macos-x86:
    name: Build on macOS x86
    runs-on: macos-13
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Create Bora Structure
        run: |
          cd ../
          git clone https://github.com/boradevelopment/bora-global.git global

      - name: Build with CMake
        uses: threeal/cmake-action@v2.1.0
        with:
          source-dir: ./
          build-dir: build/darwin
